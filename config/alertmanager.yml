global:
  # Mailtrap SMTP credentials - keep 587 for TLS
  smtp_smarthost: 'sandbox.smtp.mailtrap.io:587'
  smtp_from: 'alertmanager@predictive-maintenance.ai'
  smtp_auth_username: 'b35b64f2f5b4d0' 
  smtp_auth_password: '2b09e6331ce5e4' 
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s      
  group_interval: 5m   
  repeat_interval: 4h  
  receiver: 'mailtrap-emails'

receivers:
  - name: 'mailtrap-emails'
    email_configs:
      - to: 'sg637@snu.edu.in'
        send_resolved: true     
        html: |
          <div style="font-family: Arial, sans-serif; border: 1px solid #ddd; padding: 15px; border-radius: 5px;">
            <h2 style="color: #d9534f;"> Prometheus Alert: {{ .CommonLabels.alertname }}</h2>
            <p><b>Severity:</b> <span style="text-transform: uppercase;">{{ .CommonLabels.severity }}</span></p>
            <hr>
            <p><b>Issue:</b> {{ .CommonAnnotations.summary }}</p>
            <p><b>Details:</b> {{ .CommonAnnotations.description }}</p>
            <br>
            <p style="font-size: 0.8em; color: #777;">This alert was generated by the <b>Predictive Maintenance MLOps System</b>.</p>
            <a href="http://localhost:9090" style="display: inline-block; padding: 10px 15px; background-color: #0275d8; color: white; text-decoration: none; border-radius: 3px;">View in Prometheus</a>
          </div>